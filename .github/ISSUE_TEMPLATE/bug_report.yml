name: Bug report
description: Report a reproducible TeleFlow bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what failed and why it looks like a TeleFlow bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest code sample, package versions, and steps needed to reproduce the issue.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: teleflow-version
    attributes:
      label: TeleFlow version
      placeholder: 3.0.0-rc.1
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK/runtime version
      placeholder: 10.0.100
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - x64
        - x86
        - arm64
        - arm32
        - Other
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - Long polling
        - Webhooks
        - Raw client only
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or diagnostics
      description: Remove tokens, private chat data, and credentials before posting.
      render: text
