name: Feature request
description: Suggest a TeleFlow feature or API improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete user or framework problem this should solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Show the desired API shape or runtime behavior when possible.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and migration impact
      description: Note whether this changes public APIs, package graph, generated code, routing, state, cancellation, retries, diagnostics, or existing behavior.
    validations:
      required: true
