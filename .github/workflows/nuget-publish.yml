name: NuGet Publish

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: NuGet package version to build and publish.
        required: true
        type: string
      configuration:
        description: Build configuration.
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      publishToNuGet:
        description: Push packages to nuget.org after verification.
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: nuget-publish-${{ github.event.inputs.packageVersion }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  verify:
    name: Build and verify NuGet packages
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Verify release packages
        shell: pwsh
        run: .\eng\verify-release.ps1 -PackageVersion "${{ github.event.inputs.packageVersion }}" -Configuration "${{ github.event.inputs.configuration }}"

      - name: Upload verified packages
        uses: actions/upload-artifact@v7
        with:
          name: teleflow-nuget-packages-${{ github.event.inputs.packageVersion }}
          path: artifacts/release-packages/${{ github.event.inputs.packageVersion }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish:
    name: Publish NuGet packages
    if: ${{ github.event.inputs.publishToNuGet == 'true' }}
    needs: verify
    runs-on: windows-latest
    environment: nuget-production
    timeout-minutes: 20

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Download verified packages
        uses: actions/download-artifact@v8
        with:
          name: teleflow-nuget-packages-${{ github.event.inputs.packageVersion }}
          path: artifacts/release-packages/${{ github.event.inputs.packageVersion }}

      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: iriswolf

      - name: Publish packages to nuget.org
        shell: pwsh
        run: |
          $packageDirectory = Join-Path $env:GITHUB_WORKSPACE "artifacts\release-packages\${{ github.event.inputs.packageVersion }}"
          $packages = @(Get-ChildItem -LiteralPath $packageDirectory -Filter "*.nupkg" -File |
              Where-Object { -not $_.Name.EndsWith(".symbols.nupkg", [System.StringComparison]::OrdinalIgnoreCase) })

          if ($packages.Count -eq 0) {
              throw "No NuGet packages were found in '$packageDirectory'."
          }

          foreach ($package in $packages) {
              # Symbol packages are pushed explicitly below. Prevent dotnet from auto-pushing matching .snupkg files here.
              dotnet nuget push $package.FullName `
                  --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
                  --source "https://api.nuget.org/v3/index.json" `
                  --no-symbols `
                  --skip-duplicate

              if ($LASTEXITCODE -ne 0) {
                  throw "Failed to publish package '$($package.FullName)'."
              }
          }

          $symbolPackages = @(Get-ChildItem -LiteralPath $packageDirectory -Filter "*.snupkg" -File)

          foreach ($symbolPackage in $symbolPackages) {
              dotnet nuget push $symbolPackage.FullName `
                  --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
                  --source "https://api.nuget.org/v3/index.json" `
                  --skip-duplicate

              if ($LASTEXITCODE -ne 0) {
                  throw "Failed to publish symbol package '$($symbolPackage.FullName)'."
              }
          }
