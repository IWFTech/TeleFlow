site_name: TeleFlow
site_description: Explicit Telegram bot framework for .NET.
site_url: https://iwftech.github.io/TeleFlow/
repo_name: IWFTech/TeleFlow
repo_url: https://github.com/IWFTech/TeleFlow
edit_uri: ""

docs_dir: docs
site_dir: site
strict: true
exclude_docs: README.md

theme:
  name: material
  language: en
  logo: assets/images/teleflow-mark.svg
  favicon: assets/images/teleflow-mark.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IWFTech/TeleFlow
    - icon: fontawesome/brands/telegram
      link: https://t.me/teleflow_chat
    - icon: fontawesome/solid/cube
      link: https://www.nuget.org/packages/IWF.TeleFlow.Telegram.Framework.LongPolling/

extra_css:
  - assets/stylesheets/teleflow.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

